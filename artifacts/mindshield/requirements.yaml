packages:
  "framer-motion": "Animations and page transitions for glassmorphism UI"
  "recharts": "Dashboard charts and visualization"
  "date-fns": "Date and time formatting for dashboard and chat"
  "lucide-react": "Icons for the interface"
  "clsx": "Utility for constructing className strings"
  "tailwind-merge": "Utility for merging tailwind classes"

images:
  - path: "artifacts/mindshield/public/images/hero-bg.png"
    description: "Abstract modern futuristic background with deep indigo, purple, and cyan gradients, subtle glassmorphism elements, soft light leaks, and geometric patterns, dark mode professional aesthetic"
    aspect_ratio: "16:9"
  - path: "artifacts/mindshield/public/images/logo.png"
    description: "Minimalist glowing geometric shield logo mark in deep purple and cyan on a completely transparent background"
    aspect_ratio: "1:1"

notes:
  - Using generated Orval React Query hooks from @workspace/api-client-react
  - Expecting standard JSON REST endpoints at /api
  - Application defaults to a dark mode futuristic aesthetic

kind = "web"
previewPath = "/"
title = "MindShield AI"
version = "1.0.0"
id = "artifacts/mindshield"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20778
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/mindshield run dev"

[services.env]
PORT = "20778"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/mindshield", "run", "build"]
publicDir = "artifacts/mindshield/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
